name: Medario
options:
  bundleIdPrefix: br.com.medario
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top
  generateEmptyDirectories: true
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.0.0
settings:
  base:
    SWIFT_VERSION: 6.2
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: X66WU4VS9N
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  Medario:
    type: application
    platform: iOS
    sources:
      - path: Medario
    resources:
      - path: Medario/Resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseAppCheck
      - package: Firebase
        product: FirebaseMessaging
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.com.medario.app
        CODE_SIGN_ENTITLEMENTS: Medario/Resources/Medario.entitlements
        PRODUCT_NAME: Medario
        INFOPLIST_KEY_CFBundleDisplayName: Medário
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          APS_ENVIRONMENT: development
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: Medario iOS Development AppAttest 2026
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: Medario iOS App Store AppAttest 2026
  MedarioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MedarioTests
    dependencies:
      - target: Medario
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.com.medario.app.tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
  MedarioUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MedarioUITests
    dependencies:
      - target: Medario
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.com.medario.app.uitests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
schemes:
  Medario:
    build:
      targets:
        Medario: all
        MedarioTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - MedarioTests
        - MedarioUITests
