name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

      - name: Typecheck UI package
        run: npm --workspace @medario/ui run typecheck

      - name: Typecheck domain package
        run: npm --workspace @medario/domain run typecheck
