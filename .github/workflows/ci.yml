name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run web quality suite
        run: npm run qa:web

      - name: Typecheck UI package
        run: npm --workspace @medario/ui run typecheck

      - name: Typecheck domain package
        run: npm --workspace @medario/domain run typecheck

      - name: Run Functions privacy tests
        run: npm --prefix functions test
